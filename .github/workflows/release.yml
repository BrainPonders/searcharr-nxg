name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(rc|dev)\.[0-9]+)?$ ]]; then
            echo "Unsupported release tag: $TAG"
            exit 1
          fi
          IMAGE_REPO="ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run test suite
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover -s tests -v

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: maintainer/docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tag.outputs.image_repo }}:${{ steps.tag.outputs.tag }}
          build-args: |
            BUILD_NUMBER=${{ github.run_number }}
            VERSION=${{ steps.tag.outputs.tag }}
          labels: |
            org.opencontainers.image.title=Searcharr-nxg
            org.opencontainers.image.description=Ryot-centric Telegram request system for Radarr and Sonarr
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.tag.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true

      - name: Update available versions
        continue-on-error: true
        shell: bash
        env:
          PROJECT_IMAGE_REPO: ${{ steps.tag.outputs.image_repo }}
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- README.md docker/compose/.env.example
          python maintainer/release/update_available_versions.py

      - name: Commit updated version table
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md docker/compose/.env.example; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docker/compose/.env.example
          git commit -m "Update available versions for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
